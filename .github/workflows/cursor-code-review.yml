name: Reusable Code Review

on:
  workflow_call:
    inputs:
      prompt_path:
        description: 'Path to custom prompt file (will be appended to default prompt)'
        required: false
        type: string
        default: '.github/prompts/custom-code-review-prompt.txt'
      model_name:
        description: 'Model name to use for code review'
        required: false
        type: string
        default: 'claude-4-sonnet'
      min_lines_changed:
        description: 'Minimum lines changed to trigger review'
        required: false
        type: number
        default: 10
    secrets:
      CURSOR_API_KEY:
        description: 'Cursor API key for authentication'
        required: true

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check if review needed
        id: check_review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MIN_LINES: ${{ inputs.min_lines_changed }}
        run: |
          set -e

          # Skip if PR is draft
          if [ "$PR_DRAFT" = "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=PR is in draft status" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Skip if very small change
          TOTAL_CHANGES=$((PR_ADDITIONS + PR_DELETIONS))
          if [ "$TOTAL_CHANGES" -lt "$MIN_LINES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=Change is too small ($TOTAL_CHANGES lines)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if this exact SHA was already reviewed
          EXISTING_REVIEW=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            --jq ".[] | select(.commit_id == \"$PR_HEAD_SHA\" and .user.login == \"github-actions[bot]\") | .id" \
            | head -1)

          if [ -n "$EXISTING_REVIEW" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=Commit $PR_HEAD_SHA already reviewed (review #$EXISTING_REVIEW)" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Review will proceed: $TOTAL_CHANGES lines changed"

      - name: Skip notification
        if: steps.check_review.outputs.skip == 'true'
        run: |
          echo "⏭️ Skipping code review: ${{ steps.check_review.outputs.reason }}"

      - name: Checkout repository
        if: steps.check_review.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect Cursor Agent version
        if: steps.check_review.outputs.skip != 'true'
        id: cursor_version
        run: |
          # Extract the version baked into the current install script
          VERSION=$(curl -fsS https://cursor.com/install \
            | grep -oP 'versions/\K[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[a-f0-9]+' \
            | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not detect Cursor Agent version from install script"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected Cursor Agent version: ${VERSION}"

      - name: Cache Cursor Agent
        if: steps.check_review.outputs.skip != 'true'
        id: cache_cursor
        uses: actions/cache@v4
        with:
          path: ~/.local/share/cursor-agent
          key: cursor-agent-${{ steps.cursor_version.outputs.version }}-linux-x64

      - name: Install Cursor CLI
        if: steps.check_review.outputs.skip != 'true' && steps.cache_cursor.outputs.cache-hit != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -e
          VERSION="${{ steps.cursor_version.outputs.version }}"
          DOWNLOAD_URL="https://downloads.cursor.com/lab/${VERSION}/linux/x64/agent-cli-package.tar.gz"
          TEMP_DIR="$HOME/.local/share/cursor-agent/versions/.tmp-${VERSION}"
          FINAL_DIR="$HOME/.local/share/cursor-agent/versions/${VERSION}"

          mkdir -p "${TEMP_DIR}"

          # Attempt download with API key auth (Cursor's download requires authentication)
          echo "Downloading Cursor Agent ${VERSION}..."
          if curl -fSL \
            -H "Authorization: Bearer ${CURSOR_API_KEY}" \
            "${DOWNLOAD_URL}" | tar --strip-components=1 -xzf - -C "${TEMP_DIR}"; then
            echo "✓ Download succeeded with API key auth"
          else
            # Fallback: try without auth (in case Cursor makes it public again)
            echo "Auth download failed, retrying without auth header..."
            rm -rf "${TEMP_DIR}"
            mkdir -p "${TEMP_DIR}"
            if curl -fSL "${DOWNLOAD_URL}" | tar --strip-components=1 -xzf - -C "${TEMP_DIR}"; then
              echo "✓ Download succeeded without auth"
            else
              echo "::error::Cursor Agent download returned 403. Ensure CURSOR_API_KEY secret is valid and has download permissions."
              exit 1
            fi
          fi

          mv "${TEMP_DIR}" "${FINAL_DIR}"

      - name: Set up Cursor Agent symlinks
        if: steps.check_review.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.cursor_version.outputs.version }}"
          FINAL_DIR="$HOME/.local/share/cursor-agent/versions/${VERSION}"

          mkdir -p ~/.local/bin
          ln -sf "${FINAL_DIR}/cursor-agent" ~/.local/bin/cursor-agent
          ln -sf "${FINAL_DIR}/cursor-agent" ~/.local/bin/agent
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "✓ cursor-agent symlink created"

      - name: Validate API key
        if: steps.check_review.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "Error: CURSOR_API_KEY secret is not set"
            exit 1
          fi

      - name: Checkout shared workflow for default prompt
        if: steps.check_review.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/boxtalk-shared-workflows
          path: .shared-workflows
          sparse-checkout: |
            .github/prompts/code-review-prompt.txt

      - name: Check for custom prompt
        if: steps.check_review.outputs.skip != 'true'
        id: check_custom_prompt
        run: |
          CUSTOM_PROMPT_PATH="${{ inputs.prompt_path }}"
          if [ -f "$CUSTOM_PROMPT_PATH" ]; then
            echo "✅ Custom prompt found at $CUSTOM_PROMPT_PATH"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ No custom prompt at $CUSTOM_PROMPT_PATH (using default only)"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Combine prompts
        if: steps.check_review.outputs.skip != 'true'
        run: |
          mkdir -p .github/prompts

          # Always start with the default prompt
          cp .shared-workflows/.github/prompts/code-review-prompt.txt .github/prompts/combined-prompt.txt
          echo "✅ Default prompt loaded"

          # Append custom prompt if it exists
          if [ "${{ steps.check_custom_prompt.outputs.exists }}" = "true" ]; then
            echo "" >> .github/prompts/combined-prompt.txt
            echo "# ========================================" >> .github/prompts/combined-prompt.txt
            echo "# CUSTOM REPOSITORY-SPECIFIC INSTRUCTIONS" >> .github/prompts/combined-prompt.txt
            echo "# ========================================" >> .github/prompts/combined-prompt.txt
            echo "" >> .github/prompts/combined-prompt.txt
            cat "${{ inputs.prompt_path }}" >> .github/prompts/combined-prompt.txt
            echo "✅ Custom prompt appended to default prompt"
          else
            echo "ℹ️ Using default prompt only"
          fi

          echo "📄 Final combined prompt:"
          echo "---"
          cat .github/prompts/combined-prompt.txt
          echo "---"

      - name: Perform code review
        if: steps.check_review.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          set -eo pipefail
          # Load and prepare the combined prompt using jq for safe substitution
          PROMPT=$(jq -Rs \
            --arg repo "$REPO" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_head_sha "$PR_HEAD_SHA" \
            --arg pr_base_sha "$PR_BASE_SHA" \
            'gsub("\\{\\{REPO\\}\\}"; $repo) | gsub("\\{\\{PR_NUMBER\\}\\}"; $pr_number) | gsub("\\{\\{PR_HEAD_SHA\\}\\}"; $pr_head_sha) | gsub("\\{\\{PR_BASE_SHA\\}\\}"; $pr_base_sha)' \
            ".github/prompts/combined-prompt.txt")

          # Run cursor-agent with output capture and error handling
          echo "Starting code review with cursor-agent (model: $MODEL_NAME)..."
          if ! OUTPUT=$(cursor-agent --force --model "$MODEL_NAME" --output-format=text --print "$PROMPT" 2>&1); then
            echo "Error: cursor-agent failed with exit code $?"
            echo "Output: $OUTPUT"
            exit 1
          fi

          echo "Code review completed successfully"
          echo "$OUTPUT"
